name: Update currently reading

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and parse Goodreads RSS
        run: |
          python3 - <<'EOF'
          import urllib.request, xml.etree.ElementTree as ET, json, re

          req = urllib.request.Request(
            'https://www.goodreads.com/review/list_rss/183401118?shelf=currently-reading',
            headers={'User-Agent': 'Mozilla/5.0'}
          )
          with urllib.request.urlopen(req, timeout=10) as r:
            content = r.read()

          root = ET.fromstring(content)
          item = root.find('.//item')

          title = item.findtext('title') or '—'
          title = re.sub(r'\s*\([^)]*\)\s*$', '', title).strip()
          author = item.findtext('author_name') or ''
          cover = item.findtext('book_large_image_url') or ''

          with open('reading.json', 'w') as f:
            json.dump({'title': title, 'author': author, 'cover': cover}, f)

          print(f'Updated: {title} by {author}')
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reading.json
          git diff --staged --quiet || git commit -m "chore: update currently reading"
          git push
